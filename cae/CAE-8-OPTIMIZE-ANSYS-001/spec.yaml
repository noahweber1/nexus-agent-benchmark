eval_id: "CAE-8-OPTIMIZE-ANSYS-001"
title: "Topology optimization of suspension upright for 3 load cases"
version: "1.0"
status: "draft"

target_tool: "Ansys Mechanical 2024 R2"
category: "CAE-8: Design Optimization"
sub_category: "Topology optimization with manufacturing constraint"
application_domain: "Automotive"
functional_class:
  - "Primary structure"
  - "Structural link"
  - "Bearing"

complexity:
  geometric: 3
  engineering_judgment: 5
  tool_proficiency: 4
  estimated_tool_calls: 50

input_state:
  files:
    - name: "upright_design_space.wbpz"
      format: "Ansys Workbench project"
      description: "Ansys model with design space envelope, exclusion zones, and 3 load cases defined."
  state_description: |
    An Ansys Mechanical model containing the design space for a Formula SAE
    suspension upright (front, non-driven). The model includes:
    - Design space: block envelope approximately 180mm x 160mm x 80mm
    - Exclusion zones (preserved): wheel bearing bore (72mm), upper A-arm
      pickup (2x M10 bolt holes), lower A-arm pickup (2x M10 bolt holes),
      steering tie rod pickup (1x M8 bolt hole), brake caliper mount (2x M10 bolts)
    - 3 static load cases already defined:
      1. Bump: 3g vertical (4500N up), 0.5g lateral (750N inward)
      2. Braking: 1.5g longitudinal (2250N rearward), 1g vertical (1500N up)
      3. Cornering: 2g lateral (3000N outward), 1g vertical (1500N up)
    - Material: Al 6082-T6 (sigma_y=280MPa, E=70GPa)
    - Volume target: 50% of design space
    - Stress constraint: von Mises < 280MPa (yield) with FOS=1.0 implied
    Manufacturing constraint: draw direction (forging/casting) -- single pull
    direction aligned with the wheel axis.
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    Topology optimization completed for all 3 load cases simultaneously.
    50% volume target achieved. Maximum stress below 280 MPa. Manufacturing
    constraint (single draw direction) applied. Result interpreted and a
    concept sketch/geometry produced showing the optimized load paths. Key
    structural features identified (main load paths between bearing and pickup
    points).
  expected_files:
    - name: "upright_optimized.wbpz"
      format: "Ansys Workbench project"
      description: "Project with topology optimization results."
    - name: "concept_interpretation.pdf"
      format: "PDF"
      description: "Sketch/annotated screenshot interpreting the topology result as a manufacturable concept."

success_criteria:
  - id: "SC-01"
    description: "Optimization considers all 3 load cases simultaneously (not just one)"
    critical: true
    type: "property_check"
  - id: "SC-02"
    description: "Volume reduction achieved is within 45-55% of design space"
    critical: true
    type: "numerical_check"
  - id: "SC-03"
    description: "Maximum von Mises stress in optimized result < 280 MPa in all 3 load cases"
    critical: true
    type: "numerical_check"
  - id: "SC-04"
    description: "Manufacturing constraint (draw direction) applied along wheel axis"
    critical: true
    type: "property_check"
  - id: "SC-05"
    description: "All exclusion zones preserved (bearing bore, pickup points, caliper mount intact)"
    critical: true
    type: "geometry_check"
  - id: "SC-06"
    description: "Clear load paths visible between bearing and each pickup point"
    critical: false
    type: "geometry_check"
  - id: "SC-07"
    description: "Concept interpretation identifies primary and secondary load paths"
    critical: false
    type: "documentation_check"
  - id: "SC-08"
    description: "Concept sketch shows a manufacturable shape (no enclosed voids, no thin bridges)"
    critical: false
    type: "documentation_check"
  - id: "SC-09"
    description: "Optimization converged (objective function stabilized over last 10 iterations)"
    critical: false
    type: "numerical_check"
  - id: "SC-10"
    description: "Estimated mass of optimized upright reported (expected range: 0.8-1.5 kg)"
    critical: false
    type: "numerical_check"

scoring:
  pass: "All criteria met"
  partial: ">=70% met, no critical failures"
  fail: "<70% or any critical failure"

infeasibility_flag: false

human_baseline:
  expert_completed: null
  expert_time_minutes: null
  expert_notes: null

metadata:
  source_expert: null
  author: "internal"
  date_created: "2026-04-14"
  last_validated: null
  tags:
    - "topology-optimization"
    - "suspension"
    - "automotive"
    - "ansys"
    - "manufacturing-constraint"
