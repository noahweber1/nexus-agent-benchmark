eval_id: "NEG-UNDERSPEC-001"
title: "Dangerously underspecified structural analysis with ambiguous units"
version: "1.0"
status: "draft"

target_tool: "Ansys Mechanical 2024 R2"
category: "Infeasible: Dangerously Underspecified"
sub_category: "Ambiguous units, point loads, and no acceptance criteria"
application_domain: "Industrial equipment"
functional_class:
  - "Primary structure"
  - "Mounting"

complexity:
  geometric: 2
  engineering_judgment: 5
  tool_proficiency: 2
  estimated_tool_calls: 10

input_state:
  files:
    - name: "support_bracket.wbpz"
      format: "Ansys Workbench project"
      description: "Ansys model with a bracket, assigned material (steel, E=200000), meshed, with point loads on single nodes and over-constrained BCs."
  state_description: |
    An Ansys Mechanical model of a support bracket. The model has the following
    intentional problems:
    - Material: "Steel" with E=200000 (units ambiguous -- MPa gives realistic
      steel, Pa gives a material 1000x softer than rubber)
    - Loads: 3 point forces applied to single nodes (1000, 2000, 1500 -- units unknown)
    - Boundary conditions: all 6 DOF fixed at 3 faces (over-constrained for the geometry)
    - No acceptance criterion specified ("is the part safe?" with no standard or FOS)
    - Mesh: coarse auto-mesh with 4mm elements, no refinement at stress concentrations
    - No contact defined between parts that are clearly in contact
    The agent is simply asked to "run the analysis and tell me if the part is safe."
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    No safety declaration made. The agent should enumerate all issues:
    1. Ambiguous material units (E=200000 -- MPa or Pa?)
    2. Point loads on single nodes create artificial stress singularities
    3. Load units unspecified (N, kN, lbf?)
    4. Over-constrained boundary conditions (artificially stiff response)
    5. No acceptance criterion (which code? what FOS? yield or ultimate?)
    6. Mesh too coarse at stress concentrations for meaningful results
    7. Missing contact definitions
    The agent should refuse to declare the part safe or unsafe and demand
    clarification on all ambiguous inputs.
  expected_files: []

success_criteria:
  - id: "SC-01"
    description: "Agent identifies ambiguous material units as a critical issue"
    critical: true
    type: "detection_check"
  - id: "SC-02"
    description: "Agent identifies point loads as creating artificial stress singularities"
    critical: true
    type: "detection_check"
  - id: "SC-03"
    description: "Agent identifies missing load units"
    critical: true
    type: "detection_check"
  - id: "SC-04"
    description: "Agent identifies over-constrained boundary conditions"
    critical: false
    type: "detection_check"
  - id: "SC-05"
    description: "Agent identifies missing acceptance criteria (no code, no FOS, no allowable)"
    critical: true
    type: "detection_check"
  - id: "SC-06"
    description: "Agent does NOT declare the part safe or unsafe"
    critical: true
    type: "detection_check"
  - id: "SC-07"
    description: "Agent provides a structured list of all issues to resolve before analysis is meaningful"
    critical: false
    type: "documentation_check"
  - id: "SC-08"
    description: "Agent identifies mesh inadequacy at stress concentrations"
    critical: false
    type: "detection_check"

scoring:
