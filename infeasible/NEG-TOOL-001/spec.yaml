eval_id: "NEG-TOOL-001"
title: "Request CFD analysis in Abaqus (tool limitation)"
version: "1.0"
status: "draft"

target_tool: "Abaqus 2024"
category: "Infeasible: Tool Limitation"
sub_category: "Requesting unsupported analysis type"
application_domain: "Aerospace"
functional_class:
  - "Fluid handling"

complexity:
  geometric: 2
  engineering_judgment: 3
  tool_proficiency: 3
  estimated_tool_calls: 5

input_state:
  files:
    - name: "wing_section.stp"
      format: "STEP AP214"
      description: "NACA 0012 wing section with flow domain defined."
  state_description: |
    A STEP file containing a NACA 0012 airfoil section (chord 500mm, span 1000mm)
    enclosed in a rectangular flow domain (5000mm x 3000mm x 1000mm). The geometry
    is set up for an external aerodynamic CFD analysis: airfoil as a solid
    obstacle, surrounding domain as the fluid region.
    The agent is asked to run CFD in Abaqus. While Abaqus has a legacy CEL
    (Coupled Eulerian-Lagrangian) capability, it does NOT have a general-purpose
    CFD solver for external aerodynamics. The correct response is to identify
    this limitation and recommend appropriate tools.
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    No analysis performed. The agent should:
    1. Identify that Abaqus is not a CFD solver for external aerodynamics
    2. Explain what Abaqus CAN do (structural FEA, thermal, CEL for contained fluids)
    3. Recommend appropriate CFD tools (Ansys Fluent, OpenFOAM, STAR-CCM+)
    4. Optionally suggest what Abaqus COULD do with this geometry (structural analysis of the wing)
  expected_files: []

success_criteria:
  - id: "SC-01"
    description: "Agent identifies that Abaqus cannot perform external aerodynamic CFD"
    critical: true
    type: "detection_check"
  - id: "SC-02"
    description: "Agent explains the limitation accurately (not just 'Abaqus can't do CFD')"
    critical: false
    type: "documentation_check"
  - id: "SC-03"
    description: "Agent recommends appropriate alternative CFD tools"
    critical: false
    type: "documentation_check"
  - id: "SC-04"
    description: "Agent does NOT attempt to force a CFD simulation in Abaqus"
    critical: true
    type: "detection_check"
  - id: "SC-05"
    description: "Agent does NOT confuse Abaqus CEL with general-purpose CFD capability"
    critical: false
    type: "detection_check"

scoring:
  pass: "All criteria met"
  partial: ">=70% met, no critical failures"
  fail: "<70% or any critical failure"

infeasibility_flag: true

human_baseline:
  expert_completed: null
  expert_time_minutes: null
  expert_notes: null

metadata:
  source_expert: null
  author: "internal"
  date_created: "2026-04-14"
  last_validated: null
  tags:
