eval_id: "CAD-10-WELD-SW-001"
title: "Conveyor drive station structural frame with cut list and weld map"
version: "1.0"
status: "draft"

target_tool: "SolidWorks 2024"
category: "CAD-10: Weldment & Structural Frame Design"
sub_category: "Structural frame with weld preparation"
application_domain: "Industrial equipment"
functional_class:
  - "Primary structure"
  - "Mounting"
  - "Structural link"

complexity:
  geometric: 3
  engineering_judgment: 4
  tool_proficiency: 3
  estimated_tool_calls: 45

input_state:
  files:
    - name: "drive_station_layout.SLDPRT"
      format: "SLDPRT"
      description: "3D sketch layout defining the frame centerlines and key mounting points."
    - name: "drive_station_loads.pdf"
      format: "PDF"
      description: "Load specification: motor weight 85kg, gearbox 45kg, belt tension 8kN, and mounting interface dimensions."
  state_description: |
    A 3D sketch layout in SolidWorks defining the centerlines of a conveyor
    drive station frame. The layout defines:
    - Main frame: approximately 1200mm x 800mm x 900mm (L x W x H)
    - Motor mounting platform at 600mm height
    - Gearbox mounting platform adjacent to motor
    - Drive pulley shaft supports at frame top
    - 4 adjustable mounting feet
    - Belt tension: 8kN horizontal, applied at pulley shaft centerline
    - Motor mass: 85kg, gearbox mass: 45kg
    No structural members or profiles have been applied yet. The layout is
    just centerline geometry and reference points.
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    A complete SolidWorks weldment part with structural steel members applied
    to the layout sketch. SHS and RHS profiles selected for all members.
    Gussets at high-stress joints. Adjustable motor slide (slotted bolt holes).
    Complete cut list with member lengths, angles, and quantities. Weld map
    identifying joint types (fillet, butt, plug) and sizes. End caps on all
    exposed tube ends. Mounting feet with leveling adjustment.
  expected_files:
    - name: "drive_station_frame.SLDPRT"
      format: "SLDPRT"
      description: "Weldment part file with all structural members."
    - name: "drive_station_frame.SLDDRW"
      format: "SLDDRW"
      description: "Drawing with cut list table and weld symbols."
    - name: "cut_list.xlsx"
      format: "XLSX"
      description: "Exported cut list with part numbers, profiles, lengths, angles, and quantities."

success_criteria:
  - id: "SC-01"
    description: "All layout centerlines have structural profiles applied (no bare sketches remain)"
    critical: true
    type: "geometry_check"
  - id: "SC-02"
    description: "Profile sizes appropriate for loads (main columns >= 80x80x4 SHS, horizontals >= 60x40x3 RHS)"
    critical: true
    type: "property_check"
  - id: "SC-03"
    description: "Gusset plates at motor mount and pulley shaft support joints"
    critical: false
    type: "component_check"
  - id: "SC-04"
    description: "Motor mounting plate with adjustable slide (slotted holes for belt tension)"
    critical: true
    type: "geometry_check"
  - id: "SC-05"
    description: "All structural member intersections properly trimmed (no overlapping profiles)"
    critical: true
    type: "geometry_check"
  - id: "SC-06"
    description: "Cut list complete with profile, length, cut angle, and quantity for every member"
    critical: true
    type: "documentation_check"
  - id: "SC-07"
    description: "Weld map identifies joint type and fillet size for all connections"
    critical: false
    type: "documentation_check"
  - id: "SC-08"
    description: "End caps on all exposed tube ends"
    critical: false
    type: "component_check"
  - id: "SC-09"
    description: "4 adjustable mounting feet with leveling range >= 20mm"
    critical: false
    type: "geometry_check"
  - id: "SC-10"
    description: "Material assigned as S355J2 structural steel"
    critical: false
    type: "property_check"
  - id: "SC-11"
    description: "Total frame mass is reasonable for the design (estimate 80-150kg)"
    critical: false
    type: "numerical_check"

scoring:
  pass: "All criteria met"
  partial: ">=70% met, no critical failures"
  fail: "<70% or any critical failure"

infeasibility_flag: false

human_baseline:
  expert_completed: null
  expert_time_minutes: null
  expert_notes: null

metadata:
  source_expert: null
  author: "internal"
  date_created: "2026-04-14"
  last_validated: null
  tags:
    - "weldment"
    - "structural"
    - "conveyor"
    - "cut-list"
    - "frame"
