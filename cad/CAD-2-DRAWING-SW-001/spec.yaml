eval_id: "CAD-2-DRAWING-SW-001"
title: "Multi-sheet drawing package for CNC hydraulic manifold"
version: "1.0"
status: "draft"

target_tool: "SolidWorks 2024"
category: "CAD-2: GD&T & Technical Drawings"
sub_category: "Multi-sheet drawing with full GD&T"
application_domain: "Aerospace"
functional_class:
  - "Fluid handling"
  - "Primary structure"

complexity:
  geometric: 4
  engineering_judgment: 5
  tool_proficiency: 4
  estimated_tool_calls: 60

input_state:
  files:
    - name: "hydraulic_manifold.SLDPRT"
      format: "SLDPRT"
      description: "Fully modeled hydraulic manifold with 14 cross-drilled ports, O-ring grooves, and mounting features."
  state_description: |
    A single-body CNC-machined hydraulic manifold block in 7075-T6 aluminum.
    Dimensions approximately 180mm x 120mm x 85mm. Contains 14 cross-drilled
    hydraulic ports (4x SAE-6, 6x SAE-4, 4x M14x1.5 metric) on 4 faces.
    Internal crosshole intersections at 3 locations. 8 O-ring boss sealing
    faces with AS568 grooves. 4 mounting holes on the base. All features
    fully modeled in the part file. No drawing exists yet.
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    A complete multi-sheet drawing package (minimum 4 sheets) with:
    Sheet 1: Main orthographic views (front/top/right) with overall dimensions,
    datums, and general tolerances. Sheet 2: Section views through all cross-drilled
    port intersections (minimum 3 sections). Detail views of O-ring grooves with
    GD&T. Sheet 3: Port identification, thread callouts, and depth dimensions
    for all 14 ports. Sheet 4: Mounting hole pattern, surface finish callouts,
    and Bill of Materials with title block. All views fully dimensioned per
    ASME Y14.5-2018.
  expected_files:
    - name: "hydraulic_manifold.SLDDRW"
      format: "SLDDRW"
      description: "Multi-sheet SolidWorks drawing file."
    - name: "hydraulic_manifold_drawing.PDF"
      format: "PDF"
      description: "PDF export of the complete drawing package."

success_criteria:
  - id: "SC-01"
    description: "Drawing contains minimum 4 sheets with logical organization"
    critical: false
    type: "documentation_check"
  - id: "SC-02"
    description: "All 14 ports dimensioned with thread callout, depth, and position"
    critical: true
    type: "documentation_check"
  - id: "SC-03"
    description: "Section views through all 3 internal crosshole intersections"
    critical: true
    type: "documentation_check"
  - id: "SC-04"
    description: "O-ring grooves dimensioned with GD&T (concentricity to port axis, surface finish)"
    critical: true
    type: "documentation_check"
  - id: "SC-05"
    description: "Datum scheme established (minimum 3 datums: A=base, B=side, C=end)"
    critical: true
    type: "documentation_check"
  - id: "SC-06"
    description: "All machined faces have surface finish callouts (Ra values)"
    critical: false
    type: "documentation_check"
  - id: "SC-07"
    description: "Mounting hole pattern dimensioned with true position GD&T"
    critical: false
    type: "documentation_check"
  - id: "SC-08"
    description: "Title block fully populated: material, heat treat, finish, drawing number, revision"
    critical: false
    type: "documentation_check"
  - id: "SC-09"
    description: "Hidden lines removed in all standard views"
    critical: false
    type: "documentation_check"
  - id: "SC-10"
    description: "No overlapping dimensions or unreadable callouts"
    critical: false
    type: "documentation_check"
  - id: "SC-11"
    description: "General tolerance block present per ASME Y14.5"
    critical: false
    type: "documentation_check"
  - id: "SC-12"
    description: "PDF export produced and readable"
    critical: false
    type: "documentation_check"

scoring:
  pass: "All criteria met"
  partial: ">=70% met, no critical failures"
  fail: "<70% or any critical failure"

