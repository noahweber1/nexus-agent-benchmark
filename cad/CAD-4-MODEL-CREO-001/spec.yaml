eval_id: "CAD-4-MODEL-CREO-001"
title: "Parametric mixed-flow impeller with compound-curve blades"
version: "1.0"
status: "draft"

target_tool: "Creo Parametric 10"
category: "CAD-4: Parametric Modeling & Complex Geometry"
sub_category: "Complex surface modeling with parametric family"
application_domain: "Rotating machinery"
functional_class:
  - "Rotating component"
  - "Fluid handling"

complexity:
  geometric: 5
  engineering_judgment: 4
  tool_proficiency: 5
  estimated_tool_calls: 80

input_state:
  files:
    - name: "impeller_spec.pdf"
      format: "PDF"
      description: "Engineering specification with meridional profile, blade angle distributions at hub and shroud, and key dimensions."
    - name: "blade_profiles.csv"
      format: "CSV"
      description: "Blade angle (beta) vs meridional distance at 4 spanwise sections (hub, 33%, 66%, shroud)."
  state_description: |
    No existing CAD model. The agent starts from a specification document and
    blade profile data. The spec defines a mixed-flow impeller with:
    - Inlet diameter: 78mm, outlet diameter: 145mm
    - 7 full blades + 7 splitter blades (splitters at 50% meridional length)
    - Hub and shroud meridional profiles defined by Bezier control points
    - Blade thickness distribution: 2.0mm at leading edge, 1.2mm at trailing edge
    - Material: Inconel 718
    - Rotational speed: 48,000 RPM
    The agent must construct the full 3D model from this data.
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    A fully parametric Creo part file containing a mixed-flow impeller. The model
    must include: hub surface, shroud surface (as reference), 7 full blades with
    compound-curve profiles, 7 splitter blades starting at 50% meridional length,
    a central bore with keyway. The model must regenerate cleanly when key
    parameters (inlet diameter, outlet diameter, blade count, blade angles) are
    varied by ±15%. All surfaces must be G1-continuous minimum. The blade
    leading and trailing edges must be smooth (no faceting).
  expected_files:
    - name: "impeller.prt"
      format: "PRT (Creo)"
      description: "Fully parametric impeller part file."
    - name: "impeller_family.prt"
      format: "PRT (Creo)"
      description: "Family table with 3 size variants (80%, 100%, 120% scale)."

success_criteria:
  - id: "SC-01"
    description: "Hub meridional profile matches spec within 0.1mm deviation"
    critical: true
    type: "geometry_check"
  - id: "SC-02"
    description: "7 full blades + 7 splitter blades present and correctly patterned"
    critical: true
    type: "count_check"
  - id: "SC-03"
    description: "Blade angle distribution at all 4 spanwise sections matches CSV data within 1 degree"
    critical: true
    type: "numerical_check"
  - id: "SC-04"
    description: "Splitter blades begin at 50% meridional length (±2%)"
    critical: false
    type: "geometry_check"
  - id: "SC-05"
    description: "Blade thickness transitions smoothly from 2.0mm LE to 1.2mm TE"
    critical: false
    type: "geometry_check"
  - id: "SC-06"
    description: "All blade surfaces are G1-continuous minimum (no tangency breaks)"
    critical: true
    type: "geometry_check"
  - id: "SC-07"
    description: "Model regenerates cleanly at +15% and -15% of inlet/outlet diameter"
    critical: true
    type: "geometry_check"
  - id: "SC-08"
    description: "Central bore with keyway per DIN 6885 present"
    critical: false
    type: "geometry_check"
  - id: "SC-09"
    description: "No faceting visible on blade leading/trailing edges at display quality"
    critical: false
    type: "geometry_check"
  - id: "SC-10"
    description: "Family table with 3 size variants regenerates without errors"
    critical: false
    type: "geometry_check"
  - id: "SC-11"
    description: "Material assigned as Inconel 718 with correct density (8.19 g/cm3)"
    critical: false
    type: "property_check"

scoring:
  pass: "All criteria met"
  partial: ">=70% met, no critical failures"
  fail: "<70% or any critical failure"

infeasibility_flag: false

human_baseline:
  expert_completed: null
  expert_time_minutes: null
  expert_notes: null

metadata:
  source_expert: null
  author: "internal"
  date_created: "2026-04-14"
  last_validated: null
  tags:
    - "parametric"
    - "surfacing"
    - "turbomachinery"
    - "impeller"
    - "creo"
