eval_id: "CAD-8-TEXT2CAD-SW-001"
title: "Generate worm gear reducer housing from text specification"
version: "1.0"
status: "draft"

target_tool: "SolidWorks 2024"
category: "CAD-8: Text-to-CAD & Image-to-CAD"
sub_category: "Text specification to parametric part"
application_domain: "Industrial equipment"
functional_class:
  - "Enclosure"
  - "Power transmission"
  - "Mounting"

complexity:
  geometric: 4
  engineering_judgment: 4
  tool_proficiency: 3
  estimated_tool_calls: 55

input_state:
  files:
    - name: "reducer_spec.txt"
      format: "TXT"
      description: "Text specification for worm gear reducer housing with all dimensions and requirements."
  state_description: |
    No existing CAD model. The agent receives only a text specification describing
    a worm gear reducer housing. Key parameters from the spec:
    - Center distance: 100mm (worm axis to wheel axis)
    - Worm bore: 35mm (for 6207 bearings, 2 per side)
    - Wheel bore: 55mm (for 6211 bearings, 2 per side)
    - Split housing: horizontal split at wheel centerline
    - Wall thickness: 8mm minimum (cast iron FC250)
    - 4x M12 mounting feet on 200mm x 160mm bolt pattern
    - Oil fill port (M20x1.5) on top, drain port (M16x1.5) on bottom
    - Oil level sight glass (30mm diameter) on side
    - 4x M8 housing split bolts, 2x M10 dowel pins for alignment
    - Breather vent (M10x1) on top cover
    - Input/output shaft seal bores sized for corresponding bearing ODs
    The spec is intentionally text-only — no drawings or sketches provided.
  procurement_path: "synthetic"

prompt_file: "prompt.txt"
guide_file: "guide.md"

expected_output:
  state_description: |
    A fully parametric split-housing worm gear reducer in SolidWorks. Two-piece
    housing (upper and lower) with all features specified. Bearing bores sized
    for 6207 (worm) and 6211 (wheel). Oil ports, sight glass, breather, drain
    present. Mounting feet with bolt holes. Housing split flange with bolt holes
    and dowel pin holes. The center distance (100mm) must be a driving parameter —
    changing it should update bearing locations and housing envelope automatically.
  expected_files:
    - name: "reducer_housing_lower.SLDPRT"
      format: "SLDPRT"
      description: "Lower housing half with mounting feet."
    - name: "reducer_housing_upper.SLDPRT"
      format: "SLDPRT"
      description: "Upper housing half with fill port and breather."
    - name: "reducer_housing.SLDASM"
      format: "SLDASM"
      description: "Assembly of upper and lower housing halves."

success_criteria:
  - id: "SC-01"
    description: "Center distance between worm and wheel axes is 100mm"
    critical: true
    type: "numerical_check"
  - id: "SC-02"
    description: "Worm bearing bores sized for 6207 (72mm OD, 2 bores per side)"
    critical: true
    type: "numerical_check"
  - id: "SC-03"
    description: "Wheel bearing bores sized for 6211 (100mm OD, 2 bores per side)"
    critical: true
    type: "numerical_check"
  - id: "SC-04"
    description: "Split housing at wheel centerline with mating flange"
    critical: true
    type: "geometry_check"
  - id: "SC-05"
    description: "4x M12 mounting feet on 200mm x 160mm bolt pattern"
    critical: false
    type: "geometry_check"
  - id: "SC-06"
    description: "Oil fill port (M20x1.5), drain port (M16x1.5), sight glass (30mm) present"
    critical: false
    type: "geometry_check"
  - id: "SC-07"
    description: "4x M8 housing split bolt holes and 2x M10 dowel pin holes on flange"
    critical: false
    type: "count_check"
  - id: "SC-08"
    description: "Wall thickness minimum 8mm throughout"
    critical: false
    type: "numerical_check"
  - id: "SC-09"
    description: "Center distance is a driving parameter — model updates when changed"
    critical: true
    type: "geometry_check"
  - id: "SC-10"
    description: "Seal bores present at all 4 shaft exits, sized to bearing OD + tolerance"
    critical: false
    type: "geometry_check"
  - id: "SC-11"
    description: "Material assigned as cast iron FC250 (GG25) with correct density (7.2 g/cm3)"
    critical: false
    type: "property_check"
  - id: "SC-12"
    description: "No interference between upper and lower housing halves when assembled"
    critical: true
    type: "geometry_check"

scoring:
